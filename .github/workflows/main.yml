name: Telegram Link Getter

on:
  schedule:
    - cron: "30 14 * * *"    # runs daily at 8:00 PM IST (14:30 UTC)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}   # PAT so the later push is authorized

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write Google auth files from secrets ───────────────────────────
      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Write token.json
        run: echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      # ── 5. Write state.json (from repo if it exists, else empty) ──────────
      #    The file is committed back to the repo after each run, so on the
      #    next run the checkout above already has the latest state.json.

      # ── 6. Run the script ─────────────────────────────────────────────────
        # BOT_TOKEN is injected as an env var; the script reads it (see note)
      - name: Run telegram_link_getter.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python telegram_link_getter.py

      # ── 7. Commit updated state.json back to the repo ─────────────────────
      - name: Commit state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Only commit if state.json actually changed
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
